<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kralların Terazisi</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="map.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">

        <!-- ── HEADER ─────────────────────────────────────────────────────── -->
        <header id="game-header">
            <div class="header-left">
                <button id="home-btn" class="header-icon-btn" title="Menü">
                    <span>🏠</span>
                </button>
                <div class="game-logo">👑 Kralların Terazisi</div>
            </div>

            <div class="header-center">
                <div id="turn-indicator" class="turn-indicator">
                    <span class="turn-label">TUR</span>
                    <span id="turn-number" class="turn-number">1</span>
                    <div id="active-player-badge" class="active-player-badge"></div>
                </div>
                <div id="subtitle" class="subtitle-bar"></div>
            </div>

            <div class="header-right">
                <div id="gold-display" class="gold-display">
                    <span class="gold-icon">💰</span>
                    <span id="gold-amount">0</span>
                </div>
                <button id="sound-toggle-btn" class="header-icon-btn" title="Ses">🔊</button>
                <button id="market-btn" class="btn-market">
                    <span>🏪</span> Pazar
                </button>
                <button id="end-turn-btn" class="btn-end-turn">
                    <span>⏭️</span> Turu Bitir
                </button>
            </div>
        </header>

        <!-- ── ANA İÇERİK ─────────────────────────────────────────────────── -->
        <div id="game-content">

            <!-- Sol Panel: Oyuncular 1-4 -->
            <aside id="panel-left" class="side-panel">
                <div id="players-left" class="players-list"></div>
            </aside>

            <!-- Harita Bölgesi -->
            <section id="map-container">
                <!-- Eylem modu göstergesi -->
                <div id="action-mode-pill" class="action-mode-pill" style="display:none">
                    <span id="action-mode-text"></span>
                    <button id="cancel-action-btn">✕</button>
                </div>

                <!-- SVG Harita -->
                <svg id="game-map" xmlns="http://www.w3.org/2000/svg"></svg>

                <!-- ── LOG PANELİ ── -->
                <div id="log-panel">
                    <div id="log-toggle">
                        <span id="log-toggle-icon">▲</span> 📜 Olay Günlüğü
                        <span id="log-turn-badge"></span>
                    </div>
                    <div id="log-content"></div>
                </div>

                <!-- Zar overlay -->
                <div id="dice-overlay" class="dice-overlay">
                    <div class="dice-overlay-content">
                        <div id="dice-overlay-label" class="dice-overlay-label">⚔️ vs 🛡️</div>
                        <div class="dice-row">
                            <div class="dice-side attacker">
                                <div class="dice-player-name" id="dice-attacker-name">Saldıran</div>
                                <div class="dice-face" id="dice-face-attacker">?</div>
                            </div>
                            <div class="dice-vs">VS</div>
                            <div class="dice-side defender">
                                <div class="dice-player-name" id="dice-defender-name">Savunan</div>
                                <div class="dice-face" id="dice-face-defender">?</div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Sağ Panel: Oyuncular 5-8 -->
            <aside id="panel-right" class="side-panel">
                <div id="players-right" class="players-list"></div>
            </aside>

        </div>

        <!-- ── PAZAR MODAL ────────────────────────────────────────────────── -->
        <div id="market-backdrop" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);z-index:500;align-items:center;justify-content:center;">
            <div id="market-modal" class="market-modal-box">
                <!-- Başlık -->
                <div class="mkt-header">
                    <div class="mkt-title">🏪 Pazar Yeri</div>
                    <div class="mkt-info">
                        <div class="mkt-gold">💰 <span id="market-player-gold">0</span> Altın</div>
                        <div class="mkt-deck" id="deck-counts">
                            <span class="deck-tag bina">🏗️ <span id="deck-count-bina">0</span></span>
                            <span class="deck-tag asker">⚔️ <span id="deck-count-asker">0</span></span>
                            <span class="deck-tag diplo">🎭 <span id="deck-count-diplomasi">0</span></span>
                            <span class="deck-tag tech">🔬 <span id="deck-count-teknoloji">0</span></span>
                        </div>
                    </div>
                    <div class="mkt-actions">
                        <button id="refresh-market-btn" class="mkt-refresh-btn">
                            🔄 Yenile
                            <span id="refresh-badge-count" class="mkt-badge">2</span>
                        </button>
                        <button id="close-market-btn" class="mkt-close-btn" title="Kapat (Esc)">✕</button>
                    </div>
                </div>
                <!-- Sekme Çubuğu -->
                <div id="mkt-tab-bar" class="mkt-tab-bar">
                    <button class="mkt-tab-btn active" data-tab="standard">🏪 Standart Pazar</button>
                    <button class="mkt-tab-btn" data-tab="mercenary">⚔️💰 Paralı Askerler</button>
                </div>
                <!-- Satılık Kartlar -->
                <div id="market-cards" class="mkt-cards-area"></div>

                <!-- Elimdeki Kartlar -->
                <div class="mkt-hand-section">
                    <div class="mkt-hand-header">
                        <span class="mkt-hand-title">🃏 Elimdeki Kartlar</span>
                        <span id="hand-count" class="mkt-hand-count">0 kart</span>
                        <span class="mkt-hand-hint">Kullanmak için karta tıkla</span>
                    </div>
                    <div id="hand-cards" class="mkt-hand-row"></div>
                </div>
            </div>
        </div>


    </div><!-- #app -->

    <script type="module" src="./js/main.js"></script>
    <script>
        // Service Worker kaydı
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        }
        // Log paneli toggle
        document.getElementById('log-toggle').addEventListener('click', () => {
            const panel = document.getElementById('log-panel');
            const icon = document.getElementById('log-toggle-icon');
            const isOpen = panel.classList.toggle('log-open');
            icon.textContent = isOpen ? '▼' : '▲';
        });
    </script>
</body>
</html>
